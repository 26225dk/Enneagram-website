<!DOCTYPE html>
<html>
<head>
<title>Enneagram</title>
<link rel="stylesheet" href="style.css">
</head>
    

<body>

<div class="nav-header">

    <div class="enneagram-logo">
        <a href="#">
            <img src="enneagram.png" alt="enneagram-logo">
        </a>
    </div>

    <div class="topnav" id="nav-bar">
        <div class="nav-links">
            <a class="active" href="#Home">Home</a>
            <a href="#About the website">About the website</a>
            <a href="#More about enneagram">More about enneagram</a>
            <a href="#Contacts">Contacts</a>
        </div>
    </div>
</div>


<div class="beige-bg">

    <div class="white-q">
       
        <div class="progress-info">
            <span class="progress-label">progress</span>
            <span class="progress-percent">35%</span>
        </div>

            <div class="progress-bar-fill"></div>

    </div>

        <button class="answer-btn agree"></button>
        <button class="answer-btn strongly-agree"></button>
    </div>

    <div class="back-btn">
        <p class="back-txt">Back</p>
    </div>

    <div class="next-btn">
        <p class="next-txt">Next</p>
